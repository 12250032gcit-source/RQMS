<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RQMS – Admin Dashboard</title>
  <link rel="stylesheet" href="css/base.css">
</head>
<body>

<nav>
  <span class="brand">🍽 RQMS Admin</span>
  <ul>
    <li><span id="navStaff" style="color:#90cdf4; font-size:0.82rem;"></span></li>
    <li><a href="manage-tables.html">Manage Tables</a></li>
    <li><a href="admin-login.html" onclick="adminLogout()">Logout</a></li>
  </ul>
</nav>

<div class="dashboard" style="max-width:1200px;">

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid"></div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('queue', this)">📋 Queue</button>
    <button class="tab-btn" onclick="showTab('tables', this)">🪑 Tables</button>
    <button class="tab-btn" onclick="showTab('staff', this)">👥 Staff</button>
  </div>

  <!-- Queue Tab -->
  <div id="tab-queue" class="tab-content panel">
    <div class="filter-row">
      <h3>Queue Management</h3>
      <div class="filter-actions">
        <select id="filterStatus" onchange="loadQueue()" class="filter-select">
          <option value="">All Status</option>
          <option value="waiting">Waiting</option>
          <option value="seated">Seated</option>
          <option value="done">Done</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="loadQueue()">🔄 Refresh</button>
      </div>
    </div>
    <div class="table-wrap" id="queueTable"></div>
  </div>

  <!-- Tables Tab -->
  <div id="tab-tables" class="tab-content panel" style="display:none;">
    <div class="filter-row">
      <h3>Table Status</h3>
      <div class="filter-actions">
        <a href="manage-tables.html" class="btn btn-success btn-sm">⚙️ Add/Remove Tables</a>
        <button class="btn btn-primary btn-sm" onclick="loadTables()">🔄 Refresh</button>
      </div>
    </div>
    <div class="tables-grid" id="tablesGrid"></div>
  </div>

  <!-- Staff Tab -->
  <div id="tab-staff" class="tab-content panel" style="display:none;">
    <div class="filter-row">
      <h3>Staff Members</h3>
      <a href="admin-register.html" class="btn btn-success btn-sm">+ Add Staff</a>
    </div>
    <div class="table-wrap" id="staffTable"></div>
  </div>

</div>

<!-- Seat Modal -->
<div id="seatModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3>Assign Table</h3>
    <p class="text-muted" style="margin-bottom:1rem; font-size:0.88rem;">Select an available table for this guest</p>
    <input type="hidden" id="seatUserId">
    <div class="form-group">
      <label>Table Number</label>
      <select id="seatTableNo"></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-success" onclick="confirmSeat()">✅ Confirm</button>
      <button class="btn btn-danger"  onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="js/admin-dashboard.js"></script>
</body>
</html>
