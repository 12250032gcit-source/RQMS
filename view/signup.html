<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RQMS – Sign Up</title>
  <link rel="stylesheet" href="css/base.css">
</head>
<body>

<nav>
  <span class="brand">🍽 RQMS</span>
  <ul>
    <li><a href="index.html">Login</a></li>
    <li><a href="signup.html">Sign Up</a></li>
  </ul>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:0.75rem; font-size:2.2rem;">👤</div>
    <h1>Create Account</h1>

    <div class="form-group">
      <label>First Name</label>
      <input type="text" id="fname" placeholder="Kinley" autocomplete="given-name">
    </div>
    <div class="form-group">
      <label>Last Name</label>
      <input type="text" id="lname" placeholder="Dorji" autocomplete="family-name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="kinley@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="pw1" placeholder="Min. 6 characters" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="pw2" placeholder="••••••••" autocomplete="new-password">
    </div>

    <div id="msg" class="msg-box" style="display:none"></div>

    <button class="btn btn-primary btn-full" onclick="signUp()">Create Account</button>

    <p class="auth-footer mt-1">Already have an account? <a href="index.html">Login here</a></p>
  </div>
</div>

<script src="js/signup.js"></script>
</body>
</html>
