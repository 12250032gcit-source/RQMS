<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RQMS – Manage Tables</title>
  <link rel="stylesheet" href="css/base.css">
</head>
<body>

<nav>
  <span class="brand">🍽 RQMS Admin</span>
  <ul>
    <li><a href="admin-dashboard.html">← Dashboard</a></li>
    <li><a href="admin-login.html" onclick="adminLogout()">Logout</a></li>
  </ul>
</nav>

<div class="dashboard">
  <div class="panel">
    <h3>➕ Add New Table</h3>
    <div class="inline-form">
      <div class="form-group">
        <label>Table Number <small>(e.g. T11, VIP1)</small></label>
        <input type="text" id="tableNo" placeholder="T11">
      </div>
      <div class="form-group">
        <label>Capacity</label>
        <input type="number" id="capacity" placeholder="4" min="1" max="20" value="4">
      </div>
    </div>
    <div id="msg" class="msg-box" style="display:none; margin-top:0.75rem;"></div>
    <button class="btn btn-success" onclick="addTable()"> Add Table</button>
  </div>

  <div class="panel">
    <div class="filter-row">
      <h3> All Tables</h3>
      <button class="btn btn-primary btn-sm" onclick="loadTables()"> Refresh</button>
    </div>
    <div class="tables-grid" id="tablesGrid"></div>
  </div>
</div>

<script>
  // Guard: staff only
  window.onload = function () {
    if (!localStorage.getItem('rqms_staff')) {
      window.location.href = 'admin-login.html';
      return;
    }
    loadTables();
  };

  function adminLogout() {
    localStorage.removeItem('rqms_staff');
    localStorage.removeItem('rqms_role');
  }

  async function addTable() {
    const tableNo  = document.getElementById('tableNo').value.trim();
    const capacity = parseInt(document.getElementById('capacity').value) || 4;
    const msg      = document.getElementById('msg');

    if (!tableNo) return showMsg(msg, 'Table number is required.', 'error');

    try {
      const res = await fetch('/tables/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ table_no: tableNo, capacity })
      });
      const data = await res.json();
      if (res.ok) {
        showMsg(msg, ' Table ' + tableNo + ' added!', 'success');
        document.getElementById('tableNo').value = '';
        document.getElementById('capacity').value = '4';
        loadTables();
      } else {
        showMsg(msg, data.error || 'Failed to add table.', 'error');
      }
    } catch (e) {
      showMsg(msg, 'Server error.', 'error');
    }
  }

  async function loadTables() {
    try {
      const tables = await fetch('/tables').then(r => r.json()) || [];
      const grid = document.getElementById('tablesGrid');
      if (!tables.length) {
        grid.innerHTML = '<div class="empty-state">No tables yet.</div>';
        return;
      }
      grid.innerHTML = tables.map(t => {
        const cls = {available:'table-card-available',occupied:'table-card-occupied',reserved:'table-card-reserved'}[t.status]||'table-card-available';
        const tn = t.table_no.replace(/'/g, "\\'");
        return `<div class="table-card ${cls}">
          <div class="table-number">${esc(t.table_no)}</div>
          <div class="table-cap">👥 ${t.capacity}</div>
          <div class="table-status">${t.status}</div>
          <div class="table-card-actions">
            ${t.status!=='available'?`<button class="btn btn-success btn-sm" onclick="setStatus('${tn}','available')">Free</button>`:''}
            ${t.status==='available'?`<button class="btn btn-warning btn-sm" onclick="setStatus('${tn}','reserved')">Reserve</button>`:''}
            <button class="btn btn-danger btn-sm" onclick="deleteTable('${tn}')">🗑 Remove</button>
          </div>
        </div>`;
      }).join('');
    } catch(e) {}
  }

  async function setStatus(tableNo, status) {
    await fetch('/tables/status', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({table_no: tableNo, status})
    });
    loadTables();
  }

  async function deleteTable(tableNo) {
    if (!confirm('Remove table ' + tableNo + '? This cannot be undone.')) return;
    const res = await fetch('/tables/delete', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ table_no: tableNo })
    });
    if (res.ok) loadTables();
    else alert('Could not delete table.');
  }

  function showMsg(el, text, type) {
    el.style.display = 'block';
    el.textContent   = text;
    el.className     = 'msg-box ' + (type === 'error' ? 'msg-error' : 'msg-success');
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
