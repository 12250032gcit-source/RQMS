<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RQMS – Customer Login</title>
  <link rel="stylesheet" href="css/base.css">
</head>
<body>

<nav>
  <span class="brand">🍽 RQMS</span>
  <ul>
    <li><a href="index.html">Login</a></li>
    <li><a href="signup.html">Sign Up</a></li>
    <li><a href="admin-login.html">Staff</a></li>
    <li><a href="aboutus.html">About</a></li>
  </ul>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:0.75rem; font-size:2.5rem;">🍴</div>
    <h1>Customer Login</h1>
    <p class="auth-footer text-muted" style="margin-bottom:1.2rem;">Welcome back! Sign in to manage your booking.</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div id="msg" class="msg-box" style="display:none"></div>

    <button class="btn btn-primary btn-full" onclick="login()">Sign In</button>

    <p class="auth-footer mt-1">No account? <a href="signup.html">Create one here</a></p>
    <p class="auth-footer" style="margin-top:0.4rem;">Staff? <a href="admin-login.html">Staff Login →</a></p>
  </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
