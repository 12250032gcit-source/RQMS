<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RQMS – Staff Register</title>
  <link rel="stylesheet" href="css/base.css">
</head>
<body>

<nav>
  <span class="brand">🍽 RQMS</span>
  <ul>
    <li><a href="admin-login.html">Staff Login</a></li>
    <li><a href="index.html">Customer Login</a></li>
  </ul>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:0.75rem; font-size:2.2rem;"></div>
    <h1>Staff Registration</h1>
    <p class="auth-footer text-muted" style="margin-bottom:1.2rem;">Create a staff account to access the dashboard</p>

    <div class="form-group">
      <label>First Name</label>
      <input type="text" id="fname" placeholder="Pema" autocomplete="given-name">
    </div>
    <div class="form-group">
      <label>Last Name</label>
      <input type="text" id="lname" placeholder="Wangdi" autocomplete="family-name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="staff@restaurant.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="pw1" placeholder="Min. 6 characters" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="pw2" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="role">
        <option value="staff">Staff</option>
        <option value="manager">Manager</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <div id="msg" class="msg-box" style="display:none"></div>

    <button class="btn btn-success btn-full" onclick="staffRegister()">Register</button>

    <p class="auth-footer mt-1">Already registered? <a href="admin-login.html">Login here</a></p>
  </div>
</div>

<script src="js/admin-register.js"></script>
</body>
</html>
